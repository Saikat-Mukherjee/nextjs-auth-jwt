name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── 1. Validate: type-check + build inside Docker (no registry needed) ───
  validate:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (CI validation — not pushed)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: nextjs-auth-jwt:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_BASE_PATH=${{ secrets.NEXT_BASE_PATH }}
            NEXT_PUBLIC_BASE_PATH=${{ secrets.NEXT_BASE_PATH }}

  # ── 2. Deploy: SSH into VPS, pull code, rebuild image, restart ───────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            set -e

            cd ${{ secrets.VPS_APP_DIR }}

            echo "── Pulling latest code ──"
            git pull origin main

            echo "── Building image and restarting container ──"
            docker compose up -d --build --remove-orphans

            echo "── Pruning dangling images ──"
            docker image prune -f

            echo "✓ Deployment complete"

